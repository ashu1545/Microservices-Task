version: "3.8"

services:

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "3000:3000"
    networks:
      - micro-network

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "3001:3001"
    networks:
      - micro-network

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    networks:
      - micro-network

  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    ports:
      - "3003:3003"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge